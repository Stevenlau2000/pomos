# 部署 POMOS 前端到 GitHub Pages
#
# 流程：在 frontend/ 下 npm ci + 静态导出(next build -> out/) -> 上传产物 -> 发布到 Pages。
# basePath / assetPrefix 由 CI 中的 GITHUB_REPOSITORY 自动注入，无需手动改。
#
# 启用方式（仓库设置 → Pages → Build and deployment → Source 选 "GitHub Actions"）。

name: Deploy POMOS Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NODE_ENV: production
          # GITHUB_REPOSITORY 在 CI 中自动存在，next.config.mjs 据此注入 basePath
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
